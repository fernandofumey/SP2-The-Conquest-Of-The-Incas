<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen Seguro - La Conquista de los Incas</title>
    
    <!-- React y Babel para procesar JSX en el navegador -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS para los estilos -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase Compat (Versión estable para navegador) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; background-color: #020617; }
        .no-select { user-select: none; -webkit-user-select: none; }
        iframe { width: 100% !important; height: 100% !important; }
    </style>
</head>
<body class="text-white no-select">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- CONFIGURACIÓN DE FIREBASE ---
        const firebaseConfig = window.__firebase_config ? JSON.parse(window.__firebase_config) : {
            apiKey: "",
            authDomain: "tu-app.firebaseapp.com",
            projectId: "tu-app",
            storageBucket: "tu-app.appspot.com",
            messagingSenderId: "000000000000",
            appId: "0:000000000000:web:000000000000"
        };
        
        // Inicializar Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = window.__app_id || 'inca-secure-video';

        function App() {
            const [user, setUser] = useState(null);
            const [studentInfo, setStudentInfo] = useState({ firstName: '', lastName: '', period: '' });
            const [view, setView] = useState('login'); 
            const [playbackRate, setPlaybackRate] = useState(1);
            const [violations, setViolations] = useState(0);
            const [showSecurityWarning, setShowSecurityWarning] = useState(false);
            const [results, setResults] = useState([]);
            const [videoEnded, setVideoEnded] = useState(false);

            const playerRef = useRef(null);
            const videoContainerRef = useRef(null);
            const lastViolationTime = useRef(0);

            // --- AUTENTICACIÓN (REGLA 3) ---
            useEffect(() => {
                const initAuth = async () => {
                    const token = window.__initial_auth_token;
                    if (token) {
                        await auth.signInWithCustomToken(token);
                    } else {
                        await auth.signInAnonymously();
                    }
                };
                initAuth();
                const unsubscribe = auth.onAuthStateChanged(u => setUser(u));
                return () => unsubscribe();
            }, []);

            // --- MONITOREO DE SEGURIDAD ---
            useEffect(() => {
                if (view !== 'video' || videoEnded) return;

                const triggerAlert = (reason) => {
                    const now = Date.now();
                    if (now - lastViolationTime.current < 2000) return;
                    lastViolationTime.current = now;

                    setViolations(prev => {
                        const newFlags = prev + 1;
                        if (user) {
                            // REGLA 1: /artifacts/{appId}/public/data/sessions/{uid} (Ruta par corregida)
                            db.collection('artifacts').doc(appId)
                              .collection('public').doc('data')
                              .collection('sessions').doc(user.uid)
                              .set({
                                ...studentInfo,
                                uid: user.uid,
                                flags: newFlags,
                                lastAlert: reason,
                                timestamp: new Date().toISOString(),
                                status: 'Activo'
                              }, { merge: true });
                        }
                        return newFlags;
                    });
                    setShowSecurityWarning(true);
                };

                const handleVisibility = () => { if (document.hidden) triggerAlert('Cambio de Pestaña'); };
                const handleBlur = () => triggerAlert('Foco Perdido');
                
                const handleClickOutside = (e) => {
                    if (videoContainerRef.current && !videoContainerRef.current.contains(e.target)) {
                        triggerAlert('Clic fuera del video');
                    }
                };

                document.addEventListener('visibilitychange', handleVisibility);
                window.addEventListener('blur', handleBlur);
                document.addEventListener('mousedown', handleClickOutside);
                document.addEventListener('copy', (e) => e.preventDefault());
                document.addEventListener('paste', (e) => e.preventDefault());
                document.addEventListener('contextmenu', (e) => e.preventDefault());

                return () => {
                    document.removeEventListener('visibilitychange', handleVisibility);
                    window.removeEventListener('blur', handleBlur);
                    document.removeEventListener('mousedown', handleClickOutside);
                };
            }, [view, videoEnded, user, studentInfo]);

            // --- YOUTUBE API ---
            useEffect(() => {
                if (view === 'video' && !window.YT) {
                    const tag = document.createElement('script');
                    tag.src = "https://www.youtube.com/iframe_api";
                    document.body.appendChild(tag);
                    window.onYouTubeIframeAPIReady = loadPlayer;
                } else if (view === 'video' && window.YT) {
                    loadPlayer();
                }
            }, [view]);

            const loadPlayer = () => {
                playerRef.current = new YT.Player('player', {
                    height: '100%',
                    width: '100%',
                    videoId: '9iImmVKrWzI',
                    playerVars: { autoplay: 1, modestbranding: 1, rel: 0, controls: 1 },
                    events: {
                        onStateChange: (e) => { 
                            if (e.data === YT.PlayerState.ENDED) { 
                                setVideoEnded(true); 
                                finalize(); 
                            } 
                        }
                    }
                });
            };

            const finalize = () => {
                if (user) {
                    db.collection('artifacts').doc(appId)
                      .collection('public').doc('data')
                      .collection('sessions').doc(user.uid)
                      .update({ status: 'Finalizado', completedAt: new Date().toISOString() });
                }
            };

            const changeSpeed = (rate) => {
                setPlaybackRate(rate);
                if (playerRef.current) playerRef.current.setPlaybackRate(rate);
            };

            // --- REGISTRO PARA EL PROFESOR ---
            useEffect(() => {
                if (view === 'admin' && user) {
                    const q = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('sessions');
                    return q.onSnapshot(snap => {
                        setResults(snap.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    });
                }
            }, [view, user]);

            return (
                <div className="min-h-screen flex flex-col bg-slate-950 text-white">
                    <nav className="p-4 border-b border-white/10 flex justify-between items-center bg-black/60 backdrop-blur-md sticky top-0 z-50">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-red-600 rounded-xl flex items-center justify-center font-black italic shadow-lg shadow-red-600/20">V</div>
                            <div>
                                <h1 className="font-bold text-lg leading-tight text-red-500 uppercase">Examen Seguro</h1>
                                <p className="text-[10px] text-slate-500 uppercase font-black">BBC: La Conquista de los Incas</p>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setView('login')} className={`px-4 py-2 rounded-full text-xs font-bold transition ${view !== 'admin' ? 'bg-red-600' : 'hover:bg-white/10'}`}>Alumno</button>
                            <button onClick={() => setView('admin')} className={`px-4 py-2 rounded-full text-xs font-bold transition ${view === 'admin' ? 'bg-red-600' : 'hover:bg-white/10'}`}>Profesor</button>
                        </div>
                    </nav>

                    <main className="flex-1 p-4 md:p-8 max-w-6xl mx-auto w-full flex flex-col justify-center">
                        {view === 'login' && (
                            <div className="max-w-xl mx-auto space-y-6">
                                <div className="bg-red-950/30 border-2 border-red-500/50 p-6 rounded-3xl text-center">
                                    <h2 className="text-2xl font-black text-red-500 uppercase mb-2">Advertencia de Fraude</h2>
                                    <p className="text-slate-300 text-sm">Cualquier intento de salir de esta pestaña o hacer clic fuera del reproductor notificará al profesor inmediatamente. No usar IA ni otras ventanas.</p>
                                </div>
                                <form onSubmit={(e) => { e.preventDefault(); if(studentInfo.firstName) setView('video'); }} className="bg-slate-900 p-8 rounded-3xl border border-white/5 space-y-4">
                                    <div className="grid grid-cols-2 gap-4">
                                        <input required placeholder="Nombre" className="bg-black p-3 rounded-xl outline-none border border-white/10 focus:border-red-500" value={studentInfo.firstName} onChange={e => setStudentInfo({...studentInfo, firstName: e.target.value})} />
                                        <input required placeholder="Apellido" className="bg-black p-3 rounded-xl outline-none border border-white/10 focus:border-red-500" value={studentInfo.lastName} onChange={e => setStudentInfo({...studentInfo, lastName: e.target.value})} />
                                    </div>
                                    <select required className="w-full bg-black p-3 rounded-xl border border-white/10" value={studentInfo.period} onChange={e => setStudentInfo({...studentInfo, period: e.target.value})}>
                                        <option value="">Seleccionar Periodo</option>
                                        {[1,2,3,4,5,6].map(p => <option key={p} value={p}>Periodo {p}</option>)}
                                    </select>
                                    <button className="w-full bg-red-600 py-4 rounded-2xl font-black uppercase text-sm tracking-widest hover:bg-red-500 active:scale-95 transition-all">Iniciar Video Protegido</button>
                                </form>
                            </div>
                        )}

                        {view === 'video' && (
                            <div className="space-y-4">
                                <div className="flex justify-between items-center bg-slate-900/50 p-3 rounded-2xl border border-white/5">
                                    <div className="flex gap-2">
                                        {[1, 1.25, 1.5].map(r => (
                                            <button key={r} onClick={() => changeSpeed(r)} className={`px-3 py-1 rounded-lg text-xs font-bold ${playbackRate === r ? 'bg-red-600' : 'bg-black border border-white/10'}`}>{r}x</button>
                                        ))}
                                    </div>
                                    <div className="bg-red-500/20 px-3 py-1 rounded-full border border-red-500/30">
                                        <span className="text-[10px] font-black text-red-500 uppercase">Alertas: {violations}</span>
                                    </div>
                                </div>
                                <div ref={videoContainerRef} className="relative aspect-video bg-black rounded-3xl overflow-hidden border border-white/10 shadow-2xl">
                                    <div id="player"></div>
                                    {videoEnded && (
                                        <div className="absolute inset-0 bg-black/90 flex flex-col items-center justify-center p-6 text-center">
                                            <div className="text-5xl mb-4">🏆</div>
                                            <h2 className="text-3xl font-black mb-4">VIDEO FINALIZADO</h2>
                                            <p className="text-slate-400 mb-6">Tu actividad ha sido guardada con éxito.</p>
                                            <button onClick={() => window.location.reload()} className="bg-white text-black px-8 py-2 rounded-full font-bold uppercase text-xs tracking-widest">Reiniciar</button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {view === 'admin' && (
                            <div className="bg-slate-900 rounded-3xl border border-white/5 overflow-hidden shadow-2xl">
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left">
                                        <thead className="bg-white/5 text-[10px] uppercase font-black text-slate-500">
                                            <tr>
                                                <th className="p-4">Estudiante</th>
                                                <th className="p-4">Periodo</th>
                                                <th className="p-4 text-center">Alertas</th>
                                                <th className="p-4">Estado</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-white/5">
                                            {results.length === 0 ? (
                                                <tr><td colSpan="4" className="p-10 text-center text-slate-500 italic">No hay datos registrados aún.</td></tr>
                                            ) : (
                                                results.map(r => (
                                                    <tr key={r.id} className="hover:bg-white/[0.02]">
                                                        <td className="p-4 font-bold">{r.lastName}, {r.firstName}</td>
                                                        <td className="p-4 text-sm">P{r.period}</td>
                                                        <td className="p-4 text-center font-black text-red-500">{r.flags || 0}</td>
                                                        <td className="p-4"><span className={`text-[9px] px-2 py-1 rounded-full font-black uppercase ${r.status === 'Finalizado' ? 'bg-green-600/20 text-green-400' : 'bg-blue-600/20 text-blue-400'}`}>{r.status}</span></td>
                                                    </tr>
                                                ))
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>

                    {showSecurityWarning && (
                        <div className="fixed inset-0 bg-black/95 backdrop-blur-xl z-[100] flex items-center justify-center p-6">
                            <div className="bg-red-600 p-10 rounded-[3rem] text-center shadow-2xl max-w-sm border-2 border-white/20">
                                <div className="text-5xl mb-4">🚫</div>
                                <h2 className="text-3xl font-black mb-4 uppercase italic">ACTIVIDAD SOSPECHOSA</h2>
                                <p className="font-bold mb-8 text-sm leading-relaxed text-white">Has salido de la ventana del examen. El profesor ha recibido una alerta de posible fraude.</p>
                                <button onClick={() => setShowSecurityWarning(false)} className="w-full bg-white text-red-600 py-3 rounded-2xl font-black uppercase text-xs tracking-widest shadow-lg">Entendido, volver al video</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
