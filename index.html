<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Conquest of the Incas - Assessment</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React and ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for JSX compilation in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        .no-select { user-select: none; -webkit-user-select: none; }
        iframe { pointer-events: none; } /* Prevents interaction with YouTube UI elements */
    </style>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-start sm:items-center justify-center p-4 py-10 selection:bg-amber-500/30">
    <div id="root" class="w-full max-w-5xl"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const MAX_ALLOWED_TIME = 2941; 
        const VIDEO_ID = '9iImmVKrWzI';

        const QUIZ_QUESTIONS = [
            { id: 1, timestamp: 70, text: "What did Pizarro do in 1527 to test the loyalty of his men?", options: ["Built a fortress", "Burned the ships", "Drew a line in the sand", "Executed the mutineers"], correctIndex: 2 },
            { id: 2, timestamp: 170, text: "Unlike the Europeans, the Incas lived in 'sacred time' where they worshipped what as God?", options: ["The Moon", "The Sun", "The Earth", "The Ocean"], correctIndex: 1 },
            { id: 3, timestamp: 215, text: "Who was with Pizarro on his return to Peru in 1532?", options: ["Surviving soldiers and 4 of his brothers", "The King of Spain", "1,000 professional mercenaries", "No one; he returned alone"], correctIndex: 0 },
            { id: 4, timestamp: 290, text: "Pizarro taught Spanish to two Indians for what reason?", options: ["To convert them to Christianity", "To help them escape", "To use them as interpreters for Quechua", "To teach them how to read the Bible"], correctIndex: 2 },
            { id: 5, timestamp: 325, text: "What crop did the Spaniards taste for the first time in the Andes?", options: ["Corn", "Tomato", "Potato", "Chili Peppers"], correctIndex: 2 },
            { id: 6, timestamp: 375, text: "Approximately how many men did Pizarro have when he entered the Inca Empire?", options: ["164 men", "1,000 men", "5,000 men", "10,000 men"], correctIndex: 0 },
            { id: 7, timestamp: 425, text: "How long did the roads of the Inca Empire stretch?", options: ["500 miles", "1,000 miles", "3,000 miles", "10,000 miles"], correctIndex: 2 },
            { id: 8, timestamp: 500, text: "What did Pizarro's secretary note about the Inca hill fortresses?", options: ["They were made of wood", "They were easily destroyed", "They were built with steep rocks on either side", "They were empty"], correctIndex: 2 },
            { id: 9, timestamp: 555, text: "How many Inca soldiers were estimated to be at Cajamarca?", options: ["5,000", "15,000", "30,000", "100,000"], correctIndex: 2 },
            { id: 10, timestamp: 615, text: "Where was Atahualpa taking the waters when the two worlds met?", options: ["The Royal Palace", "A Temple", "The Hot Springs", "A Battleground"], correctIndex: 2 },
            { id: 11, timestamp: 690, text: "What was the first point of the Inca spy's report to Atahualpa?", options: ["The Spanish were gods", "They were immortal", "They are not gods", "They are giants"], correctIndex: 2 },
            { id: 12, timestamp: 730, text: "What 'power' did the Inca spy believe the Spanish Barber possessed?", options: ["He could see the future", "He could rejuvenate people with fresh skin", "He could fly", "He could turn lead into gold"], correctIndex: 1 },
            { id: 13, timestamp: 800, text: "What was Atahualpa's royal cloak made of?", options: ["Llama wool", "Gold thread", "Vampire bat skins", "Fine cotton"], correctIndex: 2 },
            { id: 14, timestamp: 860, text: "What did the priest Valde ask the Inca to do first?", options: ["Surrender his gold", "Abandon his religion and embrace Christ", "Draw a map of the empire", "Kill his generals"], correctIndex: 1 },
            { id: 15, timestamp: 895, text: "What did Atahualpa do with the Bible/Prayer book?", options: ["He kissed it", "He threw it on the floor", "He tried to read it", "He hid it in his cloak"], correctIndex: 1 },
            { id: 16, timestamp: 935, text: "How many Incas reportedly died during the massacre at the square?", options: ["60", "600", "6,000", "60,000"], correctIndex: 2 },
            { id: 17, timestamp: 975, text: "What was Atahualpa's ransom offer?", options: ["To fill a room with gold", "To give away his crown", "To become a Spanish subject", "To reveal the location of El Dorado"], correctIndex: 0 },
            { id: 18, timestamp: 1065, text: "Who was Waman Poma?", options: ["A Spanish priest", "An Inca general", "An author of Inca descent", "Pizarro's secretary"], correctIndex: 2 },
            { id: 19, timestamp: 1095, text: "How did Waman Poma describe the conquest?", options: ["A glorious victory", "A necessary evil", "The world upside down", "A spiritual awakening"], correctIndex: 2 },
            { id: 20, timestamp: 1210, text: "Despite paying the ransom, what was Atahualpa's fate?", options: ["He was released", "He was put on trial and executed", "He escaped to the jungle", "He was sent to Spain"], correctIndex: 1 },
            { id: 21, timestamp: 1335, text: "What city was the navel of the earth and sacred center of the Inca world?", options: ["Lima", "Quito", "Cusco", "Machu Picchu"], correctIndex: 2 },
            { id: 22, timestamp: 1370, text: "The fall of Cusco symbolized the triumph of what kind of time?", options: ["Sacred time", "Profane time", "Eternal time", "Modern time"], correctIndex: 1 },
            { id: 23, timestamp: 1475, text: "Who did Pizarro appoint as the puppet King?", options: ["Atahualpa", "Manco Inca", "Waman Poma", "Huayna Capac"], correctIndex: 1 },
            { id: 24, timestamp: 1515, text: "Manco Inca described the foreigners as being sent by whom?", options: ["God", "The King of Spain", "The Devil", "The Sun"], correctIndex: 2 },
            { id: 25, timestamp: 1595, text: "Where did Spanish survival hang during the Inca uprising?", options: ["The taking of the fortress at Sacsayhuamán", "The escape to the coast", "A naval battle", "A deal with the Aztecs"], correctIndex: 0 },
            { id: 26, timestamp: 1735, text: "Machu Picchu served as a place where what could greet the sun?", options: ["The Inca Army", "Living priests", "The mummies of dead Incas", "Spanish captives"], correctIndex: 2 },
            { id: 27, timestamp: 1900, text: "What made the mountain seem like it was 'about to crash' on the Spaniards?", options: ["An earthquake", "A landslide", "The roar of the Inca Army", "A volcanic eruption"], correctIndex: 2 },
            { id: 28, timestamp: 1995, text: "Manco Inca's speech told his people to keep what hidden in their hearts?", options: ["Hatred for Pizarro", "The location of gold", "Their ceremonies and gods", "Plans for a new city"], correctIndex: 2 },
            { id: 29, timestamp: 2540, text: "What act of revenge did Gonzalo Pizarro take against Manco?", options: ["Destroyed Cusco", "Stole all the gold", "Killed Manco's wife", "Burned the jungle"], correctIndex: 2 },
            { id: 30, timestamp: 2675, text: "How was Manco Inca eventually killed?", options: ["In battle", "By a snake bite", "Stabbed by Spanish guests during a game", "Executed by his own people"], correctIndex: 2 }
        ];

        const SALT = "inca_v1_";
        const encodeBase64 = (str) => btoa(unescape(encodeURIComponent(str)));
        const decodeBase64 = (str) => decodeURIComponent(escape(atob(str)));

        const getSavedNum = (key) => {
            try {
                const saved = localStorage.getItem(key);
                if (saved) return parseFloat(decodeBase64(saved).replace(SALT, '')) || 0;
            } catch(e) {}
            return 0;
        };
        
        const getSavedStr = (key) => {
            try {
                const saved = localStorage.getItem(key);
                if (saved) return decodeBase64(saved).replace(SALT, '');
            } catch(e) {}
            return "";
        };

        const TEACHER_PIN = "1234";

        const App = () => {
            const [view, setView] = useState('instructions'); 
            const [player, setPlayer] = useState(null);
            const [isPlaying, setIsPlaying] = useState(false);
            const [currentTime, setCurrentTime] = useState(() => getSavedNum('inca_video_curr_time_hash'));
            const [ccEnabled, setCcEnabled] = useState(false);
            const [playbackRate, setPlaybackRate] = useState(1);
            const [isFullscreen, setIsFullscreen] = useState(false);
            
            const [maxTimeWatched, setMaxTimeWatched] = useState(() => getSavedNum('inca_video_max_time_hash'));
            const maxTimeWatchedRef = useRef(maxTimeWatched);
            
            const [firstName, setFirstName] = useState(() => getSavedStr('inca_video_first_name'));
            const [lastName, setLastName] = useState(() => getSavedStr('inca_video_last_name'));
            const [studentPeriod, setStudentPeriod] = useState(() => getSavedStr('inca_video_period'));
            const [studentEmail, setStudentEmail] = useState(() => getSavedStr('inca_video_email'));

            const [violations, setViolations] = useState(() => getSavedNum('inca_video_violations_hash'));
            const violationsRef = useRef(violations);

            const [activeQuestion, setActiveQuestion] = useState(null);
            const [studentAnswers, setStudentAnswers] = useState(() => {
                try {
                    const saved = localStorage.getItem('inca_video_answers_hash');
                    if (saved) return JSON.parse(decodeBase64(saved).replace(SALT, ''));
                } catch(e) {}
                return {};
            });

            const [selectedOption, setSelectedOption] = useState(null);
            const [showFeedback, setShowFeedback] = useState(false);
            const [showResetConfirm, setShowResetConfirm] = useState(false);
            const [isTeacherMode, setIsTeacherMode] = useState(false);
            const [showPinModal, setShowPinModal] = useState(false);
            const [pinInput, setPinInput] = useState("");
            const [pinError, setPinError] = useState(false);

            const playerContainerRef = useRef(null);
            const intervalRef = useRef(null);
            const videoWrapperRef = useRef(null);
            const lastSeekTimeRef = useRef(0);
            const prevTimeRef = useRef(undefined);
            const lastTriggeredQuestionIdRef = useRef(null);

            const handleFirstNameChange = (e) => {
                setFirstName(e.target.value);
                localStorage.setItem('inca_video_first_name', encodeBase64(SALT + e.target.value));
            };
            const handleLastNameChange = (e) => {
                setLastName(e.target.value);
                localStorage.setItem('inca_video_last_name', encodeBase64(SALT + e.target.value));
            };
            const handlePeriodChange = (e) => {
                setStudentPeriod(e.target.value);
                localStorage.setItem('inca_video_period', encodeBase64(SALT + e.target.value));
            };
            const handleEmailChange = (e) => {
                setStudentEmail(e.target.value);
                localStorage.setItem('inca_video_email', encodeBase64(SALT + e.target.value));
            };

            const handlePinSubmit = () => {
                if (pinInput === TEACHER_PIN) {
                    setIsTeacherMode(true);
                    setShowPinModal(false);
                    setPinInput("");
                } else {
                    setPinError(true);
                }
            };

            useEffect(() => {
                const handleFullscreenChange = () => {
                    setIsFullscreen(!!(document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement));
                };
                document.addEventListener('fullscreenchange', handleFullscreenChange);
                document.addEventListener('webkitfullscreenchange', handleFullscreenChange);
                return () => {
                    document.removeEventListener('fullscreenchange', handleFullscreenChange);
                    document.removeEventListener('webkitfullscreenchange', handleFullscreenChange);
                };
            }, []);

            useEffect(() => {
                const handleVisibilityChange = () => {
                    if (document.hidden && view === 'video' && !isTeacherMode) {
                        if (player) player.pauseVideo();
                        setViolations(v => {
                            const n = v + 1;
                            violationsRef.current = n;
                            localStorage.setItem('inca_video_violations_hash', encodeBase64(SALT + n.toString()));
                            return n;
                        });
                    }
                };
                document.addEventListener("visibilitychange", handleVisibilityChange);
                return () => document.removeEventListener("visibilitychange", handleVisibilityChange);
            }, [view, player, isTeacherMode]);

            useEffect(() => {
                if (view !== 'video') return;
                if (!window.YT) {
                    const tag = document.createElement('script');
                    tag.src = "https://www.youtube.com/iframe_api";
                    document.body.appendChild(tag);
                    window.onYouTubeIframeAPIReady = initializePlayer;
                } else {
                    initializePlayer();
                }
                return () => clearInterval(intervalRef.current);
            }, [view]);

            const initializePlayer = () => {
                const startTime = Math.floor(currentTime);
                new window.YT.Player(playerContainerRef.current, {
                    width: '100%',
                    height: '100%',
                    videoId: VIDEO_ID,
                    host: 'https://www.youtube-nocookie.com',
                    playerVars: {
                        controls: 0, disablekb: 1, rel: 0, modestbranding: 1, fs: 0,
                        iv_load_policy: 3, start: startTime, cc_load_policy: 1, playsinline: 1
                    },
                    events: {
                        onReady: (event) => setPlayer(event.target),
                        onStateChange: (event) => setIsPlaying(event.data === window.YT.PlayerState.PLAYING)
                    }
                });
            };

            useEffect(() => {
                if (isPlaying && player && view === 'video') {
                    intervalRef.current = setInterval(() => {
                        const time = player.getCurrentTime();
                        if (time >= MAX_ALLOWED_TIME) {
                            player.pauseVideo();
                            handleFinalSubmit();
                            return;
                        }

                        const prev = prevTimeRef.current || time;
                        if (!isTeacherMode && time > prev + 2.5 && (Date.now() - lastSeekTimeRef.current > 1000)) {
                            player.seekTo(prev, true);
                            return;
                        }

                        setCurrentTime(time);
                        localStorage.setItem('inca_video_curr_time_hash', encodeBase64(SALT + time.toString()));

                        if (time > maxTimeWatchedRef.current) {
                            maxTimeWatchedRef.current = time;
                            setMaxTimeWatched(time);
                            localStorage.setItem('inca_video_max_time_hash', encodeBase64(SALT + time.toString()));
                        }

                        const upcoming = QUIZ_QUESTIONS.find(q => studentAnswers[q.id] === undefined && time >= q.timestamp && time < q.timestamp + 1.5);
                        if (upcoming && lastTriggeredQuestionIdRef.current !== upcoming.id) {
                            player.pauseVideo();
                            setActiveQuestion(upcoming);
                            lastTriggeredQuestionIdRef.current = upcoming.id;
                        }
                        prevTimeRef.current = time;
                    }, 500);
                } else {
                    clearInterval(intervalRef.current);
                }
            }, [isPlaying, player, view, studentAnswers, isTeacherMode]);

            const togglePlayPause = () => isPlaying ? player.pauseVideo() : player.playVideo();
            
            const toggleFullscreen = () => {
                const el = videoWrapperRef.current;
                if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                    if (el.requestFullscreen) el.requestFullscreen();
                    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
                } else {
                    if (document.exitFullscreen) document.exitFullscreen();
                    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                }
            };

            const handleOptionClick = (idx) => {
                setSelectedOption(idx);
                setShowFeedback(true);
            };

            const handleContinueVideo = () => {
                const isCorrect = selectedOption === activeQuestion.correctIndex;
                const newAnswers = { ...studentAnswers, [activeQuestion.id]: isCorrect };
                setStudentAnswers(newAnswers);
                localStorage.setItem('inca_video_answers_hash', encodeBase64(SALT + JSON.stringify(newAnswers)));
                setActiveQuestion(null);
                setSelectedOption(null);
                setShowFeedback(false);
                player.playVideo();
            };

            const handleFinalSubmit = () => {
                setView('finished');
                downloadJPG();
            };

            const downloadJPG = () => {
                const canvas = document.createElement('canvas');
                canvas.width = 1000; canvas.height = 700;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#0f172a'; ctx.fillRect(0,0,1000,700);
                ctx.fillStyle = '#f59e0b'; ctx.font = 'bold 40px Arial'; ctx.textAlign = 'center';
                ctx.fillText('CONQUEST OF THE INCAS CERTIFICATE', 500, 100);
                ctx.fillStyle = '#ffffff'; ctx.font = '30px Arial';
                ctx.fillText(`Student: ${firstName} ${lastName}`, 500, 200);
                ctx.fillText(`Period: ${studentPeriod} | Score: ${Object.values(studentAnswers).filter(v => v).length}/30`, 500, 300);
                ctx.fillText(`Security Violations: ${violations}`, 500, 400);
                const link = document.createElement('a');
                link.download = `Inca_Certificate_${firstName}.jpg`;
                link.href = canvas.toDataURL('image/jpeg');
                link.click();
            };

            if (view === 'instructions') return (
                <div className="bg-slate-800 p-8 rounded-3xl shadow-2xl border border-slate-700 w-full max-w-md mx-auto text-center">
                    <h1 className="text-2xl font-black text-amber-500 mb-6 uppercase">Inca Conquest Assessment</h1>
                    <div className="space-y-4 mb-8">
                        <input placeholder="First Name" value={firstName} onChange={handleFirstNameChange} className="w-full bg-slate-900 p-3 rounded-xl border border-slate-700" />
                        <input placeholder="Last Name" value={lastName} onChange={handleLastNameChange} className="w-full bg-slate-900 p-3 rounded-xl border border-slate-700" />
                        <select value={studentPeriod} onChange={handlePeriodChange} className="w-full bg-slate-900 p-3 rounded-xl border border-slate-700">
                            <option value="">Select Period</option>
                            {['1','2','3','4','5','6'].map(p => <option key={p} value={p}>{p}</option>)}
                        </select>
                        <input placeholder="Email" value={studentEmail} onChange={handleEmailChange} className="w-full bg-slate-900 p-3 rounded-xl border border-slate-700" />
                    </div>
                    <button 
                        disabled={!firstName || !lastName || !studentPeriod} 
                        onClick={() => setView('video')} 
                        className="bg-amber-600 w-full py-4 rounded-2xl font-bold uppercase disabled:opacity-50"
                    >
                        Start Assessment
                    </button>
                    <button onClick={() => setShowPinModal(true)} className="mt-4 text-xs text-slate-500">Teacher Login</button>
                    {showPinModal && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-[100] p-4">
                            <div className="bg-slate-800 p-6 rounded-2xl w-full max-w-xs">
                                <h2 className="font-bold mb-4">Enter PIN</h2>
                                <input type="password" value={pinInput} onChange={e => setPinInput(e.target.value)} className="w-full bg-slate-900 p-2 rounded mb-4" />
                                <button onClick={handlePinSubmit} className="bg-amber-600 w-full py-2 rounded font-bold">Unlock</button>
                                <button onClick={() => setShowPinModal(false)} className="w-full py-2 text-xs text-slate-400 mt-2">Cancel</button>
                            </div>
                        </div>
                    )}
                </div>
            );

            if (view === 'finished') return (
                <div className="bg-slate-800 p-12 rounded-3xl text-center">
                    <h1 className="text-4xl font-black mb-4">Assessment Finished</h1>
                    <p className="text-xl text-amber-500 mb-8">Final Score: {Object.values(studentAnswers).filter(v => v).length} / 30</p>
                    <button onClick={downloadJPG} className="bg-amber-600 px-8 py-3 rounded-xl font-bold">Download Certificate</button>
                </div>
            );

            return (
                <div className="w-full flex flex-col gap-4 animate-fadeIn no-select">
                    <div 
                        ref={videoWrapperRef} 
                        className={`relative group bg-black overflow-hidden ${isFullscreen ? 'w-screen h-screen' : 'w-full aspect-video rounded-3xl shadow-2xl border border-slate-700'}`}
                    >
                        <div ref={playerContainerRef} className="w-full h-full pointer-events-none"></div>
                        
                        {activeQuestion && (
                            <div className="absolute inset-0 bg-slate-900/95 z-50 flex items-center justify-center p-6">
                                <div className="max-w-xl w-full bg-slate-800 p-8 rounded-3xl border border-slate-600 shadow-2xl">
                                    <h2 className="text-xl font-bold mb-6">{activeQuestion.text}</h2>
                                    <div className="space-y-3">
                                        {activeQuestion.options.map((opt, i) => (
                                            <button 
                                                key={i} 
                                                onClick={() => handleOptionClick(i)} 
                                                disabled={showFeedback}
                                                className={`w-full text-left p-4 rounded-xl border-2 font-bold transition ${showFeedback ? (i === activeQuestion.correctIndex ? 'border-green-500 bg-green-500/10' : (i === selectedOption ? 'border-red-500 bg-red-500/10' : 'border-slate-800 opacity-50')) : 'border-slate-700 hover:border-amber-500'}`}
                                            >
                                                {opt}
                                            </button>
                                        ))}
                                    </div>
                                    {showFeedback && (
                                        <button onClick={handleContinueVideo} className="mt-6 bg-amber-600 w-full py-3 rounded-xl font-bold uppercase">Continue</button>
                                    )}
                                </div>
                            </div>
                        )}

                        <div className="absolute bottom-0 left-0 w-full p-4 bg-gradient-to-t from-black to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex flex-col gap-2">
                            <div className="h-1 bg-slate-700 rounded-full relative overflow-hidden">
                                <div className="absolute left-0 top-0 h-full bg-amber-500" style={{ width: `${(currentTime/MAX_ALLOWED_TIME)*100}%` }}></div>
                            </div>
                            <div className="flex items-center justify-between">
                                <div className="flex items-center gap-4">
                                    <button onClick={togglePlayPause}>{isPlaying ? 'Pause' : 'Play'}</button>
                                    <button onClick={toggleFullscreen}>⛶ Fullscreen</button>
                                </div>
                                <div className="text-xs font-mono">{Math.floor(currentTime/60)}:{(Math.floor(currentTime%60)).toString().padStart(2,'0')} / 49:01</div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
