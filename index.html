<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inca Conquest - Interactive Quiz</title>
    
    <!-- React & Babel for JSX -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase Compat (v8 style for browser compatibility without bundlers) -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .no-select { user-select: none; -webkit-user-select: none; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 no-select">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- FIREBASE SETUP ---
        const apiKey = ""; 
        const firebaseConfig = window.__firebase_config ? JSON.parse(window.__firebase_config) : {
            apiKey: apiKey,
            authDomain: "placeholder-auth.firebaseapp.com",
            projectId: "placeholder-project",
            storageBucket: "placeholder-project.appspot.com",
            messagingSenderId: "000000000000",
            appId: "0:000000000000:web:000000000000"
        };
        const appId = window.__app_id || 'inca-conquest-quiz';

        // Initialize Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        const quizData = [
            { time: 60, question: "What did Pizarro do to challenge his men on the island in 1527?", options: ["Burned the ships", "Drew a line in the sand", "Executed the mutineers", "Ordered a fast"], answer: 1 },
            { time: 150, question: "What was the name of the Empire Pizarro was seeking?", options: ["Aztec", "Maya", "Inca", "Olmec"], answer: 2 },
            { time: 270, question: "According to the video, what did the Incas worship as their primary God?", options: ["The Moon", "The Earth", "The Sun", "The Ocean"], answer: 2 },
            { time: 340, question: "Who was the great Inca ruler Pizarro was heading to meet?", options: ["Montezuma", "Atahualpa", "Manco Inca", "Huayna Capac"], answer: 1 },
            { time: 460, question: "What language did Pizarro have his two Indian students learn?", options: ["Spanish", "Quechua", "Latin", "Portuguese"], answer: 0 },
            { time: 520, question: "What vegetable did the Spaniards taste for the first time in the Andes?", options: ["Corn", "Tomato", "Potato", "Chili Pepper"], answer: 2 },
            { time: 610, question: "Approximately how many men did Pizarro have when entering the Empire?", options: ["1,000", "5,000", "164", "500"], answer: 2 },
            { time: 700, question: "How long were the roads of the Inca Empire?", options: ["500 miles", "3,000 miles", "10,000 miles", "1,000 miles"], answer: 1 },
            { time: 850, question: "What city was the Inca ruler staying in when Pizarro arrived?", options: ["Cusco", "Lima", "Cajamarca", "Quito"], answer: 2 },
            { time: 920, question: "How many soldiers were estimated to be in Atahualpa's army?", options: ["5,000", "15,000", "30,000", "80,000"], answer: 2 },
            { time: 1040, question: "Where was Atahualpa when the two worlds first met?", options: ["The Royal Palace", "The Hot Springs", "A Temple", "A Battleground"], answer: 1 },
            { time: 1110, question: "What did Atahualpa's spy report about the Spaniards?", options: ["They were gods", "They were immortal", "They were not gods and could die", "They were from the stars"], answer: 2 },
            { time: 1190, question: "What did the Inca spy notice about the Spanish 'Barber'?", options: ["He was a great fighter", "He had powers to rejuvenate people", "He was a spy", "He was the leader"], answer: 1 },
            { time: 1300, question: "What unique material was Atahualpa's royal cloak made of?", options: ["Llama wool", "Gold thread", "Vampire bat skins", "Parrot feathers"], answer: 2 },
            { time: 1420, question: "What did the priest Valde offer to Atahualpa first?", options: ["A sword", "A gold coin", "A prayer book/Bible", "A map"], answer: 2 },
            { time: 1495, question: "What action by Atahualpa served as the pretext for Pizarro to attack?", options: ["He spat on the ground", "He threw the book on the floor", "He drew his sword", "He ordered his men to charge"], answer: 1 },
            { time: 1540, question: "What was the result of the initial Spanish attack in the square?", options: ["Spanish retreat", "A peaceful truce", "Massacre of Incas and capture of Atahualpa", "Capture of Pizarro"], answer: 2 },
            { time: 1610, question: "What did Atahualpa offer as a ransom for his freedom?", options: ["A mountain of silver", "To fill a room with gold", "His daughter in marriage", "The city of Cusco"], answer: 1 },
            { time: 1740, question: "Who was Waman Poma?", options: ["A Spanish priest", "An Inca general", "An author of Inca descent", "Pizarro's brother"], answer: 2 },
            { time: 1810, question: "What phrase does Waman Poma use to describe the conquest?", options: ["The new dawn", "The world upside down", "The golden age", "The great liberation"], answer: 1 },
            { time: 2000, question: "What happened to Atahualpa after the ransom was paid?", options: ["He was released", "He was made a governor", "He was put on trial and executed", "He escaped"], answer: 2 },
            { time: 2160, question: "What city was the naval/sacred center of the Inca Empire?", options: ["Lima", "Cusco", "Tiahuanaco", "Chan Chan"], answer: 1 },
            { time: 2285, question: "What transition did the fall of Cusco represent in global history?", options: ["The end of sacred time", "The start of the industrial age", "The spread of democracy", "The end of the Renaissance"], answer: 0 },
            { time: 2435, question: "Who was the 'puppet king' appointed by the Pizarros?", options: ["Atahualpa", "Manco Inca", "Huayna Capac", "Tupac Amaru"], answer: 1 },
            { time: 2520, question: "What drove Manco Inca to lead a war of liberation?", options: ["Religious vision", "Desire for gold", "Spanish insults and mistreatment", "A request from the Pope"], answer: 2 },
            { time: 2650, question: "During the siege of Cusco, which Spanish brother was killed?", options: ["Francisco", "Hernando", "Juan", "Gonzalo"], answer: 2 },
            { time: 2880, question: "Where did the mummies of the dead Incas 'greet the sun'?", options: ["Cusco", "Cajamarca", "Machu Picchu", "Lima"], answer: 2 },
            { time: 3150, question: "Where did Manco Inca win a pitched battle against the Spaniards?", options: ["Cusco", "Ollantaytambo", "Lima", "Quito"], answer: 1 },
            { time: 3500, question: "What was the 'Lost City' where the Incas made their final stand?", options: ["Machu Picchu", "Vilcabamba", "Cusco", "Nazca"], answer: 1 },
            { time: 4460, question: "How did Manco Inca eventually die?", options: ["Old age", "Died in battle", "Stabbed by Spanish guests while playing a game", "Poisoned by his son"], answer: 2 }
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [studentInfo, setStudentInfo] = useState({ firstName: '', lastName: '', period: '' });
            const [view, setView] = useState('login'); 
            const [quizStarted, setQuizStarted] = useState(false);
            const [currentQuestionIndex, setCurrentQuestionIndex] = useState(null);
            const [score, setScore] = useState(0);
            const [completed, setCompleted] = useState(false);
            const [cheatAlerts, setCheatAlerts] = useState(0);
            const [results, setResults] = useState([]);
            
            const playerRef = useRef(null);
            const checkInterval = useRef(null);

            useEffect(() => {
                const initAuth = async () => {
                    const token = window.__initial_auth_token;
                    if (token) {
                        await auth.signInWithCustomToken(token);
                    } else {
                        await auth.signInAnonymously();
                    }
                };
                initAuth();
                const unsubscribe = auth.onAuthStateChanged(setUser);
                return () => unsubscribe();
            }, []);

            // Anti-Cheat
            useEffect(() => {
                if (!quizStarted || completed) return;

                const triggerAlert = (msg) => {
                    setCheatAlerts(prev => prev + 1);
                    const el = document.createElement('div');
                    el.className = "fixed top-10 left-1/2 -translate-x-1/2 bg-red-600 text-white font-bold px-6 py-3 rounded-full shadow-2xl z-[9999] animate-bounce";
                    el.innerText = `⚠️ SECURITY: ${msg}`;
                    document.body.appendChild(el);
                    setTimeout(() => el.remove(), 3000);
                };

                const onVisibilityChange = () => { if (document.hidden) triggerAlert("TAB SWITCH DETECTED"); };
                const onBlur = () => triggerAlert("WINDOW FOCUS LOST");
                const onCopyPaste = (e) => { e.preventDefault(); triggerAlert("COPY/PASTE BLOCKED"); };
                const onContextMenu = (e) => e.preventDefault();

                document.addEventListener('visibilitychange', onVisibilityChange);
                window.addEventListener('blur', onBlur);
                document.addEventListener('copy', onCopyPaste);
                document.addEventListener('paste', onCopyPaste);
                document.addEventListener('contextmenu', onContextMenu);

                return () => {
                    document.removeEventListener('visibilitychange', onVisibilityChange);
                    window.removeEventListener('blur', onBlur);
                    document.removeEventListener('copy', onCopyPaste);
                    document.removeEventListener('paste', onCopyPaste);
                    document.removeEventListener('contextmenu', onContextMenu);
                };
            }, [quizStarted, completed]);

            // YouTube API
            useEffect(() => {
                if (view === 'quiz' && !window.YT) {
                    const tag = document.createElement('script');
                    tag.src = "https://www.youtube.com/iframe_api";
                    document.body.appendChild(tag);
                    window.onYouTubeIframeAPIReady = initPlayer;
                } else if (view === 'quiz' && window.YT) {
                    initPlayer();
                }
                return () => clearInterval(checkInterval.current);
            }, [view]);

            const initPlayer = () => {
                playerRef.current = new window.YT.Player('player', {
                    height: '100%',
                    width: '100%',
                    videoId: '9iImmVKrWzI',
                    playerVars: { autoplay: 1, controls: 1, disablekb: 1, modestbranding: 1 },
                    events: { onStateChange: (e) => { if (e.data === 1) startLoop(); else clearInterval(checkInterval.current); } }
                });
            };

            const startLoop = () => {
                clearInterval(checkInterval.current);
                checkInterval.current = setInterval(() => {
                    const time = playerRef.current.getCurrentTime();
                    const qIdx = quizData.findIndex(q => !q.done && time >= q.time && time < q.time + 2);
                    if (qIdx !== -1) {
                        playerRef.current.pauseVideo();
                        setCurrentQuestionIndex(qIdx);
                        clearInterval(checkInterval.current);
                    }
                }, 500);
            };

            const handleAnswer = (idx) => {
                const isCorrect = idx === quizData[currentQuestionIndex].answer;
                if (isCorrect) setScore(s => s + 1);
                quizData[currentQuestionIndex].done = true;
                setCurrentQuestionIndex(null);
                playerRef.current.playVideo();
                startLoop();
            };

            const finalize = async () => {
                setCompleted(true);
                const result = {
                    ...studentInfo,
                    grade: Math.round((score / quizData.length) * 100),
                    cheating: cheatAlerts,
                    timestamp: new Date().toISOString()
                };
                if (user) {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('grades').add(result);
                }
            };

            useEffect(() => {
                if (view === 'admin' && user) {
                    const q = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('grades');
                    return q.onSnapshot((snap) => {
                        setResults(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                    });
                }
            }, [view, user]);

            return (
                <div className="min-h-screen flex flex-col">
                    <nav className="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-900/80 backdrop-blur sticky top-0 z-50">
                        <div className="flex items-center gap-2">
                            <div className="w-8 h-8 bg-amber-500 rounded flex items-center justify-center text-slate-900 font-bold">V</div>
                            <span className="font-bold hidden sm:inline">Inca Conquest Assessment</span>
                        </div>
                        <div className="flex gap-2 text-xs">
                            <button onClick={() => setView('login')} className={`px-4 py-2 rounded-full transition ${view === 'login' ? 'bg-amber-500 text-black' : 'hover:bg-slate-800'}`}>Student</button>
                            <button onClick={() => setView('admin')} className={`px-4 py-2 rounded-full transition ${view === 'admin' ? 'bg-amber-500 text-black' : 'hover:bg-slate-800'}`}>Gradebook</button>
                        </div>
                    </nav>

                    <main className="flex-1 p-4 flex flex-col items-center justify-center">
                        {view === 'login' && !quizStarted && (
                            <div className="bg-slate-800 p-8 rounded-3xl border border-slate-700 shadow-2xl w-full max-w-md">
                                <h2 className="text-2xl font-bold mb-4">Class Entry</h2>
                                <div className="space-y-4">
                                    <input placeholder="First Name" className="w-full bg-slate-900 p-3 rounded-xl outline-none ring-1 ring-slate-700 focus:ring-amber-500" value={studentInfo.firstName} onChange={e => setStudentInfo({...studentInfo, firstName: e.target.value})} spellCheck="false" autoComplete="off" />
                                    <input placeholder="Last Name" className="w-full bg-slate-900 p-3 rounded-xl outline-none ring-1 ring-slate-700 focus:ring-amber-500" value={studentInfo.lastName} onChange={e => setStudentInfo({...studentInfo, lastName: e.target.value})} spellCheck="false" autoComplete="off" />
                                    <select className="w-full bg-slate-900 p-3 rounded-xl ring-1 ring-slate-700" value={studentInfo.period} onChange={e => setStudentInfo({...studentInfo, period: e.target.value})}>
                                        <option value="">Select Period</option>
                                        {[1,2,3,4,5,6].map(p => <option key={p} value={p}>Period {p}</option>)}
                                    </select>
                                    <button disabled={!studentInfo.firstName || !studentInfo.period} onClick={() => { setQuizStarted(true); setView('quiz'); }} className="w-full bg-amber-500 py-3 rounded-xl text-black font-bold disabled:opacity-50 hover:bg-amber-400 transition">Start Lesson</button>
                                </div>
                            </div>
                        )}

                        {view === 'quiz' && !completed && (
                            <div className="w-full max-w-5xl">
                                <div className="relative aspect-video bg-black rounded-3xl overflow-hidden shadow-2xl border border-slate-800">
                                    <div id="player"></div>
                                    
                                    {currentQuestionIndex !== null && (
                                        <div className="absolute inset-0 bg-slate-900/95 flex items-center justify-center p-8 z-50">
                                            <div className="w-full max-w-2xl">
                                                <p className="text-amber-500 text-xs font-bold mb-2 uppercase tracking-widest">Question {currentQuestionIndex + 1}</p>
                                                <h3 className="text-xl sm:text-2xl font-bold mb-8">{quizData[currentQuestionIndex].question}</h3>
                                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                                    {quizData[currentQuestionIndex].options.map((opt, i) => (
                                                        <button key={i} onClick={() => handleAnswer(i)} className="bg-slate-800 hover:bg-slate-700 p-4 rounded-2xl text-left border border-slate-700 transition">
                                                            <span className="font-bold text-amber-500 mr-2">{String.fromCharCode(65+i)}.</span> {opt}
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    <div className="absolute top-4 right-4 flex gap-2">
                                        <div className="bg-black/50 px-3 py-1 rounded-full text-xs border border-white/10">Grade: {Math.round((score/quizData.length)*100)}%</div>
                                        <button onClick={finalize} className="bg-green-600 px-4 py-1 rounded-full text-xs font-bold hover:bg-green-500 transition">Submit Now</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {completed && (
                            <div className="text-center animate-in fade-in zoom-in duration-500">
                                <div className="text-6xl mb-4">🏆</div>
                                <h2 className="text-3xl font-bold mb-2">Well Done, {studentInfo.firstName}!</h2>
                                <p className="text-slate-400 mb-8">Assessment successfully submitted to the gradebook.</p>
                                <div className="flex gap-4 justify-center">
                                    <div className="bg-slate-800 px-6 py-4 rounded-3xl border border-slate-700">
                                        <div className="text-4xl font-bold text-amber-500">{Math.round((score/quizData.length)*100)}%</div>
                                        <div className="text-xs uppercase text-slate-500 font-bold mt-1 tracking-tighter">Final Score</div>
                                    </div>
                                    <div className="bg-slate-800 px-6 py-4 rounded-3xl border border-slate-700">
                                        <div className="text-4xl font-bold">{score}/{quizData.length}</div>
                                        <div className="text-xs uppercase text-slate-500 font-bold mt-1 tracking-tighter">Correct</div>
                                    </div>
                                </div>
                                <button onClick={() => window.location.reload()} className="mt-8 text-slate-500 hover:text-white text-sm">Return Home</button>
                            </div>
                        )}

                        {view === 'admin' && (
                            <div className="w-full max-w-5xl">
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-2xl font-bold">Gradebook</h2>
                                    <p className="text-xs text-slate-500">Auto-updating live feed</p>
                                </div>
                                <div className="bg-slate-800 rounded-3xl border border-slate-700 overflow-hidden shadow-xl">
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left">
                                            <thead className="bg-slate-900/50">
                                                <tr>
                                                    <th className="p-4 text-xs font-bold text-slate-500 uppercase tracking-widest">Student</th>
                                                    <th className="p-4 text-xs font-bold text-slate-500 uppercase tracking-widest">Period</th>
                                                    <th className="p-4 text-xs font-bold text-slate-500 uppercase tracking-widest">Score</th>
                                                    <th className="p-4 text-xs font-bold text-slate-500 uppercase tracking-widest">Alerts</th>
                                                    <th className="p-4 text-xs font-bold text-slate-500 uppercase tracking-widest">Time</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-700">
                                                {results.length === 0 ? (
                                                    <tr><td colSpan="5" className="p-12 text-center text-slate-500 italic">Waiting for submissions...</td></tr>
                                                ) : (
                                                    results.map(r => (
                                                        <tr key={r.id} className="hover:bg-slate-700/30 transition">
                                                            <td className="p-4 font-bold">{r.lastName}, {r.firstName}</td>
                                                            <td className="p-4"><span className="bg-slate-900 px-2 py-1 rounded text-xs">P{r.period}</span></td>
                                                            <td className="p-4 font-bold text-lg">{r.grade}%</td>
                                                            <td className="p-4">
                                                                {r.cheating > 0 ? (
                                                                    <span className="bg-red-500/20 text-red-400 px-2 py-1 rounded text-xs font-bold">⚠️ {r.cheating} Flags</span>
                                                                ) : <span className="text-green-500 text-xs font-bold">Clean</span>}
                                                            </td>
                                                            <td className="p-4 text-xs text-slate-500">{new Date(r.timestamp).toLocaleTimeString()}</td>
                                                        </tr>
                                                    ))
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
