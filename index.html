<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inca Conquest - Interactive Quiz</title>
    
    <!-- React & Babel for JSX -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Firebase Compat (v8 style for browser compatibility without bundlers) -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .no-select { user-select: none; -webkit-user-select: none; }
        
        /* Custom scrollbar for a premium look */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        .video-overlay-enter { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 no-select">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- FIREBASE SETUP ---
        const apiKey = ""; 
        const firebaseConfig = window.__firebase_config ? JSON.parse(window.__firebase_config) : {
            apiKey: apiKey,
            authDomain: "placeholder-auth.firebaseapp.com",
            projectId: "placeholder-project",
            storageBucket: "placeholder-project.appspot.com",
            messagingSenderId: "000000000000",
            appId: "0:000000000000:web:000000000000"
        };
        const appId = window.__app_id || 'inca-conquest-quiz';

        // Initialize Firebase safely
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();

        const quizData = [
            { time: 60, question: "What did Pizarro do to challenge his men on the island in 1527?", options: ["Burned the ships", "Drew a line in the sand", "Executed the mutineers", "Ordered a fast"], answer: 1 },
            { time: 150, question: "What was the name of the Empire Pizarro was seeking?", options: ["Aztec", "Maya", "Inca", "Olmec"], answer: 2 },
            { time: 270, question: "According to the video, what did the Incas worship as their primary God?", options: ["The Moon", "The Earth", "The Sun", "The Ocean"], answer: 2 },
            { time: 340, question: "Who was the great Inca ruler Pizarro was heading to meet?", options: ["Montezuma", "Atahualpa", "Manco Inca", "Huayna Capac"], answer: 1 },
            { time: 460, question: "What language did Pizarro have his two Indian students learn?", options: ["Spanish", "Quechua", "Latin", "Portuguese"], answer: 0 },
            { time: 520, question: "What vegetable did the Spaniards taste for the first time in the Andes?", options: ["Corn", "Tomato", "Potato", "Chili Pepper"], answer: 2 },
            { time: 610, question: "Approximately how many men did Pizarro have when entering the Empire?", options: ["1,000", "5,000", "164", "500"], answer: 2 },
            { time: 700, question: "How long were the roads of the Inca Empire?", options: ["500 miles", "3,000 miles", "10,000 miles", "1,000 miles"], answer: 1 },
            { time: 850, question: "What city was the Inca ruler staying in when Pizarro arrived?", options: ["Cusco", "Lima", "Cajamarca", "Quito"], answer: 2 },
            { time: 920, question: "How many soldiers were estimated to be in Atahualpa's army?", options: ["5,000", "15,000", "30,000", "80,000"], answer: 2 },
            { time: 1040, question: "Where was Atahualpa when the two worlds first met?", options: ["The Royal Palace", "The Hot Springs", "A Temple", "A Battleground"], answer: 1 },
            { time: 1110, question: "What did Atahualpa's spy report about the Spaniards?", options: ["They were gods", "They were immortal", "They were not gods and could die", "They were from the stars"], answer: 2 },
            { time: 1190, question: "What did the Inca spy notice about the Spanish 'Barber'?", options: ["He was a great fighter", "He had powers to rejuvenate people", "He was a spy", "He was the leader"], answer: 1 },
            { time: 1300, question: "What unique material was Atahualpa's royal cloak made of?", options: ["Llama wool", "Gold thread", "Vampire bat skins", "Parrot feathers"], answer: 2 },
            { time: 1420, question: "What did the priest Valde offer to Atahualpa first?", options: ["A sword", "A gold coin", "A prayer book/Bible", "A map"], answer: 2 },
            { time: 1495, question: "What action by Atahualpa served as the pretext for Pizarro to attack?", options: ["He spat on the ground", "He threw the book on the floor", "He drew his sword", "He ordered his men to charge"], answer: 1 },
            { time: 1540, question: "What was the result of the initial Spanish attack in the square?", options: ["Spanish retreat", "A peaceful truce", "Massacre of Incas and capture of Atahualpa", "Capture of Pizarro"], answer: 2 },
            { time: 1610, question: "What did Atahualpa offer as a ransom for his freedom?", options: ["A mountain of silver", "To fill a room with gold", "His daughter in marriage", "The city of Cusco"], answer: 1 },
            { time: 1740, question: "Who was Waman Poma?", options: ["A Spanish priest", "An Inca general", "An author of Inca descent", "Pizarro's brother"], answer: 2 },
            { time: 1810, question: "What phrase does Waman Poma use to describe the conquest?", options: ["The new dawn", "The world upside down", "The golden age", "The great liberation"], answer: 1 },
            { time: 2000, question: "What happened to Atahualpa after the ransom was paid?", options: ["He was released", "He was made a governor", "He was put on trial and executed", "He escaped"], answer: 2 },
            { time: 2160, question: "What city was the naval/sacred center of the Inca Empire?", options: ["Lima", "Cusco", "Tiahuanaco", "Chan Chan"], answer: 1 },
            { time: 2285, question: "What transition did the fall of Cusco represent in global history?", options: ["The end of sacred time", "The start of the industrial age", "The spread of democracy", "The end of the Renaissance"], answer: 0 },
            { time: 2435, question: "Who was the 'puppet king' appointed by the Pizarros?", options: ["Atahualpa", "Manco Inca", "Huayna Capac", "Tupac Amaru"], answer: 1 },
            { time: 2520, question: "What drove Manco Inca to lead a war of liberation?", options: ["Religious vision", "Desire for gold", "Spanish insults and mistreatment", "A request from the Pope"], answer: 2 },
            { time: 2650, question: "During the siege of Cusco, which Spanish brother was killed?", options: ["Francisco", "Hernando", "Juan", "Gonzalo"], answer: 2 },
            { time: 2880, question: "Where did the mummies of the dead Incas 'greet the sun'?", options: ["Cusco", "Cajamarca", "Machu Picchu", "Lima"], answer: 2 },
            { time: 3150, question: "Where did Manco Inca win a pitched battle against the Spaniards?", options: ["Cusco", "Ollantaytambo", "Lima", "Quito"], answer: 1 },
            { time: 3500, question: "What was the 'Lost City' where the Incas made their final stand?", options: ["Machu Picchu", "Vilcabamba", "Cusco", "Nazca"], answer: 1 },
            { time: 4460, question: "How did Manco Inca eventually die?", options: ["Old age", "Died in battle", "Stabbed by Spanish guests while playing a game", "Poisoned by his son"], answer: 2 }
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [studentInfo, setStudentInfo] = useState({ firstName: '', lastName: '', period: '' });
            const [view, setView] = useState('login'); 
            const [quizStarted, setQuizStarted] = useState(false);
            const [currentQuestionIndex, setCurrentQuestionIndex] = useState(null);
            const [score, setScore] = useState(0);
            const [completed, setCompleted] = useState(false);
            const [cheatAlerts, setCheatAlerts] = useState(0);
            const [results, setResults] = useState([]);
            const [furthestWatched, setFurthestWatched] = useState(0);
            const [isLoading, setIsLoading] = useState(true);
            
            const playerRef = useRef(null);
            const checkInterval = useRef(null);

            // Auth Setup
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        const token = window.__initial_auth_token;
                        if (token) {
                            await auth.signInWithCustomToken(token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (e) { console.error("Auth failed:", e); }
                    setIsLoading(false);
                };
                initAuth();
                const unsubscribe = auth.onAuthStateChanged(u => setUser(u));
                return () => unsubscribe();
            }, []);

            // Anti-Cheat: Logic for Active Window & Interaction
            useEffect(() => {
                if (!quizStarted || completed) return;

                const triggerAlert = (msg) => {
                    setCheatAlerts(prev => prev + 1);
                    const el = document.createElement('div');
                    el.className = "fixed top-10 left-1/2 -translate-x-1/2 bg-red-600 text-white font-bold px-6 py-3 rounded-full shadow-2xl z-[9999] animate-bounce text-sm sm:text-base";
                    el.innerText = `⚠️ SECURITY FLAG: ${msg}`;
                    document.body.appendChild(el);
                    setTimeout(() => el.remove(), 3000);
                };

                const onVisibilityChange = () => { if (document.hidden) triggerAlert("WINDOW INACTIVE"); };
                const onBlur = () => triggerAlert("CLICKED OUTSIDE QUIZ");
                const onCopyPaste = (e) => { e.preventDefault(); triggerAlert("COPY/PASTE ATTEMPT"); };
                const onContextMenu = (e) => e.preventDefault();

                document.addEventListener('visibilitychange', onVisibilityChange);
                window.addEventListener('blur', onBlur);
                document.addEventListener('copy', onCopyPaste);
                document.addEventListener('paste', onCopyPaste);
                document.addEventListener('contextmenu', onContextMenu);

                return () => {
                    document.removeEventListener('visibilitychange', onVisibilityChange);
                    window.removeEventListener('blur', onBlur);
                    document.removeEventListener('copy', onCopyPaste);
                    document.removeEventListener('paste', onCopyPaste);
                    document.removeEventListener('contextmenu', onContextMenu);
                };
            }, [quizStarted, completed]);

            // YouTube API Initializer
            useEffect(() => {
                if (view === 'quiz' && !window.YT) {
                    const tag = document.createElement('script');
                    tag.src = "https://www.youtube.com/iframe_api";
                    document.body.appendChild(tag);
                    window.onYouTubeIframeAPIReady = initPlayer;
                } else if (view === 'quiz' && window.YT) {
                    initPlayer();
                }
                return () => clearInterval(checkInterval.current);
            }, [view]);

            const initPlayer = () => {
                if (playerRef.current) return;
                playerRef.current = new window.YT.Player('player', {
                    height: '100%',
                    width: '100%',
                    videoId: '9iImmVKrWzI',
                    playerVars: { 
                        autoplay: 1, 
                        controls: 1, 
                        disablekb: 1, 
                        modestbranding: 1,
                        rel: 0
                    },
                    events: { 
                        onStateChange: (e) => { 
                            if (e.data === 1) startLoop(); 
                            else clearInterval(checkInterval.current); 
                        } 
                    }
                });
            };

            const startLoop = () => {
                clearInterval(checkInterval.current);
                checkInterval.current = setInterval(() => {
                    if (!playerRef.current || !playerRef.current.getCurrentTime) return;
                    
                    const time = playerRef.current.getCurrentTime();
                    
                    // --- ED-PUZZLE LOGIC: NO SKIPPING AHEAD ---
                    if (time > furthestWatched + 2) {
                        playerRef.current.seekTo(furthestWatched, true);
                        const el = document.createElement('div');
                        el.className = "fixed bottom-20 left-1/2 -translate-x-1/2 bg-amber-600 text-white px-4 py-2 rounded-lg z-50 text-xs font-bold";
                        el.innerText = "NO SKIPPING: Complete current section first.";
                        document.body.appendChild(el);
                        setTimeout(() => el.remove(), 2000);
                        return;
                    }
                    
                    if (time > furthestWatched) setFurthestWatched(time);

                    // --- QUESTION TRIGGER ---
                    const qIdx = quizData.findIndex(q => !q.done && time >= q.time && time < q.time + 1.5);
                    if (qIdx !== -1) {
                        playerRef.current.pauseVideo();
                        setCurrentQuestionIndex(qIdx);
                        clearInterval(checkInterval.current);
                    }
                }, 500);
            };

            const handleAnswer = (idx) => {
                const isCorrect = idx === quizData[currentQuestionIndex].answer;
                if (isCorrect) setScore(s => s + 1);
                quizData[currentQuestionIndex].done = true;
                setCurrentQuestionIndex(null);
                
                // Small buffer to prevent double-triggering the same question
                playerRef.current.seekTo(playerRef.current.getCurrentTime() + 1, true);
                playerRef.current.playVideo();
                startLoop();
            };

            const finalize = async () => {
                setCompleted(true);
                if (playerRef.current) playerRef.current.pauseVideo();
                
                const result = {
                    firstName: studentInfo.firstName,
                    lastName: studentInfo.lastName,
                    period: studentInfo.period,
                    grade: Math.round((score / quizData.length) * 100),
                    cheating: cheatAlerts,
                    userId: user ? user.uid : 'anonymous',
                    timestamp: new Date().toISOString()
                };

                if (user) {
                    try {
                        // Correct Pathing for Rule 1
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('grades').add(result);
                    } catch (e) { console.error("Save failed:", e); }
                }
            };

            useEffect(() => {
                if (view === 'admin' && user) {
                    const q = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('grades');
                    return q.onSnapshot((snap) => {
                        setResults(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                    }, (err) => console.error("Listen failed:", err));
                }
            }, [view, user]);

            if (isLoading) return (
                <div className="min-h-screen bg-slate-950 flex items-center justify-center">
                    <div className="text-center">
                        <div className="w-12 h-12 border-4 border-amber-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                        <p className="text-slate-400 font-medium">Initializing Learning Environment...</p>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col selection:bg-amber-500 selection:text-slate-900">
                    <nav className="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-900/80 backdrop-blur sticky top-0 z-50">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-amber-500 rounded-xl flex items-center justify-center text-slate-900 shadow-lg shadow-amber-500/20">
                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                            </div>
                            <div>
                                <h1 className="font-bold text-lg leading-tight">Inca Conquest</h1>
                                <p className="text-[10px] uppercase text-slate-500 tracking-tighter">BBC Documentary Assessment</p>
                            </div>
                        </div>
                        <div className="flex gap-2">
                            <button onClick={() => setView('login')} className={`px-4 py-2 rounded-full text-xs font-bold transition ${view === 'login' ? 'bg-amber-500 text-black shadow-lg shadow-amber-500/20' : 'text-slate-400 hover:bg-slate-800'}`}>Quiz</button>
                            <button onClick={() => setView('admin')} className={`px-4 py-2 rounded-full text-xs font-bold transition ${view === 'admin' ? 'bg-amber-500 text-black shadow-lg shadow-amber-500/20' : 'text-slate-400 hover:bg-slate-800'}`}>Teacher Log</button>
                        </div>
                    </nav>

                    <main className="flex-1 p-4 flex flex-col items-center justify-center max-w-7xl mx-auto w-full">
                        {view === 'login' && !quizStarted && (
                            <div className="bg-slate-800 p-8 rounded-[2rem] border border-slate-700 shadow-2xl w-full max-w-md video-overlay-enter">
                                <h2 className="text-2xl font-bold mb-2">Student Check-in</h2>
                                <p className="text-slate-400 text-sm mb-6 leading-relaxed">Enter your information exactly as it appears on the roster. Skipping and cheating are monitored.</p>
                                <div className="space-y-4">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-500 uppercase ml-1">First Name</label>
                                        <input className="w-full bg-slate-900 p-3.5 rounded-xl outline-none ring-1 ring-slate-700 focus:ring-2 focus:ring-amber-500 transition-all" value={studentInfo.firstName} onChange={e => setStudentInfo({...studentInfo, firstName: e.target.value})} spellCheck="false" />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-500 uppercase ml-1">Last Name</label>
                                        <input className="w-full bg-slate-900 p-3.5 rounded-xl outline-none ring-1 ring-slate-700 focus:ring-2 focus:ring-amber-500 transition-all" value={studentInfo.lastName} onChange={e => setStudentInfo({...studentInfo, lastName: e.target.value})} spellCheck="false" />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-500 uppercase ml-1">Class Period</label>
                                        <select className="w-full bg-slate-900 p-3.5 rounded-xl ring-1 ring-slate-700 appearance-none" value={studentInfo.period} onChange={e => setStudentInfo({...studentInfo, period: e.target.value})}>
                                            <option value="">Select Period</option>
                                            {[1,2,3,4,5,6].map(p => <option key={p} value={p}>Period {p}</option>)}
                                        </select>
                                    </div>
                                    <button 
                                        disabled={!studentInfo.firstName || !studentInfo.lastName || !studentInfo.period} 
                                        onClick={() => { setQuizStarted(true); setView('quiz'); }} 
                                        className="w-full bg-amber-500 py-4 rounded-xl text-black font-bold disabled:opacity-30 disabled:grayscale hover:bg-amber-400 transition transform active:scale-[0.98] mt-4 shadow-xl shadow-amber-500/10"
                                    >
                                        Begin Lesson
                                    </button>
                                </div>
                            </div>
                        )}

                        {view === 'quiz' && !completed && (
                            <div className="w-full">
                                <div className="relative aspect-video bg-black rounded-[2rem] overflow-hidden shadow-2xl border border-slate-800 ring-1 ring-white/5">
                                    <div id="player"></div>
                                    
                                    {currentQuestionIndex !== null && (
                                        <div className="absolute inset-0 bg-slate-900/98 flex items-center justify-center p-6 sm:p-12 z-50 video-overlay-enter">
                                            <div className="w-full max-w-3xl">
                                                <div className="flex items-center gap-3 mb-4">
                                                    <span className="bg-amber-500 text-slate-900 text-[10px] font-black px-2 py-0.5 rounded uppercase">Question {currentQuestionIndex + 1}</span>
                                                    <div className="flex-1 h-[1px] bg-slate-800"></div>
                                                </div>
                                                <h3 className="text-xl sm:text-3xl font-bold mb-10 leading-tight">{quizData[currentQuestionIndex].question}</h3>
                                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                                    {quizData[currentQuestionIndex].options.map((opt, i) => (
                                                        <button 
                                                            key={i} 
                                                            onClick={() => handleAnswer(i)} 
                                                            className="group bg-slate-800 hover:bg-slate-700 p-5 rounded-2xl text-left border border-slate-700 hover:border-amber-500/50 transition-all flex items-start gap-4"
                                                        >
                                                            <div className="w-8 h-8 rounded-lg bg-slate-900 flex-shrink-0 flex items-center justify-center font-bold text-amber-500 group-hover:bg-amber-500 group-hover:text-slate-900 transition-colors">
                                                                {String.fromCharCode(65+i)}
                                                            </div>
                                                            <span className="text-sm sm:text-base font-medium">{opt}</span>
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* Real-time Status */}
                                    <div className="absolute top-4 right-4 flex gap-2">
                                        <div className="bg-black/70 backdrop-blur px-4 py-2 rounded-full text-[10px] font-bold border border-white/10 uppercase tracking-widest">
                                            Grade: <span className="text-amber-500">{Math.round((score/quizData.length)*100)}%</span>
                                        </div>
                                        <button onClick={finalize} className="bg-green-600 hover:bg-green-500 px-4 py-2 rounded-full text-[10px] font-black border border-white/10 uppercase tracking-widest transition">Submit</button>
                                    </div>
                                </div>
                                <div className="mt-6 flex justify-between items-center text-slate-500 text-[10px] font-bold uppercase tracking-widest px-4">
                                    <div className="flex gap-4">
                                        <span>Student: {studentInfo.firstName} {studentInfo.lastName}</span>
                                        <span>Period: {studentInfo.period}</span>
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <div className={`w-2 h-2 rounded-full ${cheatAlerts > 0 ? 'bg-red-500 animate-pulse' : 'bg-green-500'}`}></div>
                                        <span>Security Flags: {cheatAlerts}</span>
                                    </div>
                                </div>
                            </div>
                        )}

                        {completed && (
                            <div className="text-center p-8 bg-slate-800/50 border border-slate-700 rounded-[3rem] w-full max-w-lg video-overlay-enter">
                                <div className="text-7xl mb-6">🏜️</div>
                                <h2 className="text-3xl font-bold mb-2">Lesson Complete</h2>
                                <p className="text-slate-400 text-sm mb-8 max-w-xs mx-auto">Your scores and security logs have been synchronized with the teacher's gradebook.</p>
                                <div className="grid grid-cols-2 gap-4 mb-8">
                                    <div className="bg-slate-900 p-6 rounded-3xl border border-slate-800">
                                        <div className="text-4xl font-black text-amber-500">{Math.round((score/quizData.length)*100)}%</div>
                                        <div className="text-[10px] uppercase text-slate-500 font-bold mt-2">Final Grade</div>
                                    </div>
                                    <div className="bg-slate-900 p-6 rounded-3xl border border-slate-800">
                                        <div className="text-4xl font-black text-slate-100">{score}/{quizData.length}</div>
                                        <div className="text-[10px] uppercase text-slate-500 font-bold mt-2">Questions</div>
                                    </div>
                                </div>
                                <button onClick={() => window.location.reload()} className="bg-slate-700 hover:bg-slate-600 px-8 py-3 rounded-full text-xs font-bold transition">Retake Assessment</button>
                            </div>
                        )}

                        {view === 'admin' && (
                            <div className="w-full animate-in fade-in duration-700">
                                <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
                                    <div>
                                        <h2 className="text-3xl font-bold">Teacher Gradebook</h2>
                                        <p className="text-slate-500 text-sm">Real-time monitoring of class {appId}</p>
                                    </div>
                                    <div className="bg-amber-500/10 border border-amber-500/20 px-4 py-2 rounded-xl">
                                        <span className="text-amber-500 text-xs font-black uppercase tracking-widest">Active Sessions: {results.length}</span>
                                    </div>
                                </div>
                                
                                <div className="bg-slate-800 rounded-[2rem] border border-slate-700 overflow-hidden shadow-2xl">
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left">
                                            <thead className="bg-slate-900/50">
                                                <tr>
                                                    <th className="p-5 text-[10px] font-black text-slate-500 uppercase tracking-widest">Student</th>
                                                    <th className="p-5 text-[10px] font-black text-slate-500 uppercase tracking-widest">Period</th>
                                                    <th className="p-5 text-[10px] font-black text-slate-500 uppercase tracking-widest text-center">Score</th>
                                                    <th className="p-5 text-[10px] font-black text-slate-500 uppercase tracking-widest text-center">Security</th>
                                                    <th className="p-5 text-[10px] font-black text-slate-500 uppercase tracking-widest">UID</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-700/50">
                                                {results.length === 0 ? (
                                                    <tr><td colSpan="5" className="p-20 text-center text-slate-500 italic">No submissions yet...</td></tr>
                                                ) : (
                                                    results.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp)).map(r => (
                                                        <tr key={r.id} className="hover:bg-slate-700/20 transition group">
                                                            <td className="p-5">
                                                                <div className="font-bold text-slate-200 group-hover:text-amber-500 transition-colors">{r.lastName}, {r.firstName}</div>
                                                                <div className="text-[10px] text-slate-500 mt-0.5">{new Date(r.timestamp).toLocaleString()}</div>
                                                            </td>
                                                            <td className="p-5"><span className="bg-slate-900 px-3 py-1 rounded-lg border border-slate-700 text-xs font-bold">P{r.period}</span></td>
                                                            <td className="p-5 text-center">
                                                                <span className={`text-xl font-black ${r.grade >= 80 ? 'text-green-500' : r.grade >= 65 ? 'text-amber-500' : 'text-red-500'}`}>{r.grade}%</span>
                                                            </td>
                                                            <td className="p-5 text-center">
                                                                {r.cheating > 0 ? (
                                                                    <div className="inline-flex items-center gap-1.5 bg-red-500/10 text-red-500 px-3 py-1 rounded-full text-[10px] font-black border border-red-500/20">
                                                                        ⚠️ {r.cheating} FLAGS
                                                                    </div>
                                                                ) : <span className="text-green-500 text-[10px] font-black uppercase">Verified Clean</span>}
                                                            </td>
                                                            <td className="p-5">
                                                                <code className="text-[10px] text-slate-600 font-mono bg-slate-900/50 px-2 py-1 rounded">{r.userId}</code>
                                                            </td>
                                                        </tr>
                                                    ))
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                    
                    <footer className="p-6 text-center text-slate-600 text-[10px] font-bold uppercase tracking-[0.2em]">
                        &copy; 2024 Educational Assessment Portal • Secure Environment
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
